<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DNA Synthesis Methods</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --accent:   #00d4ff;
    --accent2:  #0066ff;
    --dim:      #061520;
    --muted:    #1e4560;
    --text:     #8ecfea;
  }

  html { background: #000; }

  body {
    background: #000;
    font-family: 'Share Tech Mono', monospace;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 20px 48px;
  }

  /* Page-wide scanlines */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,212,255,0.01) 2px, rgba(0,212,255,0.01) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* ── Page header ─────────────────────────────────────────────────────────── */
  .page-header {
    text-align: center;
    margin-bottom: 32px;
    width: 100%;
    max-width: 1280px;
    position: relative;
  }

  .page-header .eyebrow {
    font-size: 0.6rem;
    letter-spacing: 5px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .page-header h1 {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: clamp(1.4rem, 3vw, 2.2rem);
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--accent);
    text-shadow: 0 0 30px rgba(0,212,255,0.5), 0 0 80px rgba(0,212,255,0.15);
    margin-bottom: 10px;
  }

  .page-header .tagline {
    font-size: 0.65rem;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* Flanking lines */
  .page-header::before, .page-header::after {
    content: '';
    position: absolute;
    top: 50%; width: 18%; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0,212,255,0.3));
    transform: translateY(-50%);
  }
  .page-header::before { left: 0; }
  .page-header::after  { right: 0; background: linear-gradient(270deg, transparent, rgba(0,212,255,0.3)); }

  /* ── Comparison label strip ──────────────────────────────────────────────── */
  .compare-strip {
    display: flex;
    align-items: center;
    gap: 0;
    width: 100%;
    max-width: 1280px;
    margin-bottom: 10px;
  }
  .compare-strip .cs-label {
    flex: 1;
    text-align: center;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 6px 0;
    border-top: 1px solid rgba(0,212,255,0.12);
    border-bottom: 1px solid rgba(0,212,255,0.12);
    transition: color 0.3s, text-shadow 0.3s;
  }
  .compare-strip .cs-label.spds  { color: #58a6ff; border-left: 1px solid rgba(0,212,255,0.12); }
  .compare-strip .cs-label.dna   { color: #00d4ff; border-right: 1px solid rgba(0,212,255,0.12); }
  .compare-strip .cs-divider {
    width: 1px; height: 30px;
    background: linear-gradient(180deg, transparent, rgba(0,212,255,0.25), transparent);
    flex-shrink: 0;
  }
  .compare-strip .cs-label.active {
    color: #fff;
    text-shadow: 0 0 12px rgba(0,212,255,0.7);
  }

  /* ── Hover hint ──────────────────────────────────────────────────────────── */
  .hover-hint {
    font-size: 0.55rem;
    letter-spacing: 2.5px;
    color: rgba(0,212,255,0.25);
    text-transform: uppercase;
    margin-bottom: 14px;
    transition: opacity 0.4s;
  }
  .hover-hint.hidden { opacity: 0; }

  /* ── Main panels wrapper ─────────────────────────────────────────────────── */
  .panels {
    display: flex;
    gap: 20px;
    align-items: flex-start;
    width: 100%;
    max-width: 1280px;
    position: relative;
  }

  /* ── Individual panel ────────────────────────────────────────────────────── */
  .panel {
    position: relative;
    border-radius: 4px;
    cursor: default;
    transition:
      transform     0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94),
      opacity       0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94),
      box-shadow    0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    transform-origin: center top;
    will-change: transform, opacity;
  }

  /* Corner brackets on each panel */
  .panel::before, .panel::after,
  .panel .corner-bl, .panel .corner-br {
    content: '';
    position: absolute;
    width: 16px; height: 16px;
    border-color: rgba(0,212,255,0.25);
    border-style: solid;
    pointer-events: none;
    z-index: 10;
    transition: border-color 0.3s;
  }
  .panel::before   { top:-2px;    left:-2px;  border-width: 2px 0 0 2px; }
  .panel::after    { top:-2px;    right:-2px; border-width: 2px 2px 0 0; }
  .panel .corner-bl{ bottom:-2px; left:-2px;  border-width: 0 0 2px 2px; content:''; position:absolute; width:16px; height:16px; border-color:rgba(0,212,255,0.25); border-style:solid; pointer-events:none; z-index:10; transition: border-color 0.3s; }
  .panel .corner-br{ bottom:-2px; right:-2px; border-width: 0 2px 2px 0; content:''; position:absolute; width:16px; height:16px; border-color:rgba(0,212,255,0.25); border-style:solid; pointer-events:none; z-index:10; transition: border-color 0.3s; }

  .panel.active::before, .panel.active::after,
  .panel.active .corner-bl, .panel.active .corner-br {
    border-color: rgba(0,212,255,0.85);
  }

  /* Panel glow overlay */
  .panel .frame-glow {
    position: absolute; inset: 0;
    border-radius: 4px;
    pointer-events: none;
    z-index: 5;
    transition: box-shadow 0.45s ease;
    box-shadow:
      0 0 0 1px rgba(0,212,255,0.08),
      0 0 20px rgba(0,212,255,0.03);
  }
  .panel.active .frame-glow {
    box-shadow:
      0 0 0 1px rgba(0,212,255,0.4),
      0 0 40px rgba(0,212,255,0.15),
      0 0 80px rgba(0,100,255,0.08);
  }

  /* Dimmed state when other panel is active */
  .panels.has-active .panel:not(.active) {
    opacity: 0.42;
    transform: scale(0.967) translateY(4px);
  }

  /* Active panel pops forward */
  .panels.has-active .panel.active {
    transform: scale(1.032) translateY(-4px);
    opacity: 1;
    z-index: 10;
  }

  /* Scan-line shimmer on active panel */
  .panel.active::before {
    animation: bracket-pulse 1.8s ease-in-out infinite;
  }
  @keyframes bracket-pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.5; }
  }

  /* iframe sizing — each scaled to display at the same height */
  .panel-spds {
    flex-shrink: 0;
  }
  .panel-dna {
    flex-shrink: 0;
  }

  /* Scale wrappers so both panels display at the same visual height */
  .scale-wrap {
    display: block;
    overflow: hidden;
    border-radius: 3px;
  }

  .scale-wrap iframe {
    display: block;
    border: none;
    transform-origin: top left;
  }

  /* ── Status bar ──────────────────────────────────────────────────────────── */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    max-width: 1280px;
    margin-top: 14px;
    padding: 0 4px;
    font-size: 0.55rem;
    letter-spacing: 2px;
    color: rgba(0,212,255,0.2);
    text-transform: uppercase;
  }
  .status-bar .blink {
    animation: blink 1.2s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* ── Responsive: stack on narrow screens ─────────────────────────────────── */
  @media (max-width: 900px) {
    .panels { flex-direction: column; align-items: center; }
    .panels.has-active .panel:not(.active) { transform: scale(0.985); }
    .panels.has-active .panel.active       { transform: scale(1.015) translateY(-4px); }
    .page-header::before, .page-header::after { display: none; }
  }
</style>
</head>
<body>

<div class="panels" id="panels">

  <!-- SPDS Panel -->
  <div class="panel panel-spds" id="panel-spds">
    <div class="frame-glow"></div>
    <div class="corner-bl"></div>
    <div class="corner-br"></div>
    <div class="scale-wrap" id="wrap-spds">
      <iframe
        id="iframe-spds"
        src="https://nanosynth-llc.github.io/nanobot_synthesis/spds_animation1.html"
        scrolling="no"
        title="Solid-Phase DNA Synthesis">
      </iframe>
    </div>
  </div>

  <!-- DNA Elongation Panel -->
  <div class="panel panel-dna" id="panel-dna">
    <div class="frame-glow"></div>
    <div class="corner-bl"></div>
    <div class="corner-br"></div>
    <div class="scale-wrap" id="wrap-dna">
      <iframe
        id="iframe-dna"
        src="https://nanosynth-llc.github.io/nanobot_synthesis/dna_elongation.html"
        scrolling="no"
        title="DNA Elongation">
      </iframe>
    </div>
  </div>

</div>

<div class="status-bar">
  <span>SYS: <span style="color:rgba(0,212,255,0.5)">ONLINE</span></span>
  <span class="blink">■</span>
  <span>DUAL-VIEW SYNTHESIS COMPARISON</span>
  <span class="blink">■</span>
  <span>VER: 1.0.0</span>
</div>

<script>
  // ── Iframe and scale configuration ───────────────────────────────────────
  // Natural dimensions of each animation
  const SPDS_W = 420, SPDS_H = 790;
  const DNA_W  = 820, DNA_H  = 700;

  // Target display height for both panels — they'll match this height
  const TARGET_H = 640;

  const spdsScale = TARGET_H / SPDS_H;   // ~0.810
  const dnaScale  = TARGET_H / DNA_H;    // ~0.914

  function applyScales() {
    const wrapSpds = document.getElementById('wrap-spds');
    const wrapDna  = document.getElementById('wrap-dna');
    const ifrSpds  = document.getElementById('iframe-spds');
    const ifrDna   = document.getElementById('iframe-dna');

    // SPDS
    ifrSpds.width  = SPDS_W;
    ifrSpds.height = SPDS_H;
    ifrSpds.style.transform = `scale(${spdsScale})`;
    ifrSpds.style.transformOrigin = 'top left';
    wrapSpds.style.width  = Math.round(SPDS_W * spdsScale) + 'px';
    wrapSpds.style.height = TARGET_H + 'px';

    // DNA
    ifrDna.width  = DNA_W;
    ifrDna.height = DNA_H;
    ifrDna.style.transform = `scale(${dnaScale})`;
    ifrDna.style.transformOrigin = 'top left';
    wrapDna.style.width  = Math.round(DNA_W * dnaScale) + 'px';
    wrapDna.style.height = TARGET_H + 'px';
  }

  applyScales();

  // ── Hover interaction ─────────────────────────────────────────────────────
  const panelsEl  = document.getElementById('panels');
  const panelSpds = document.getElementById('panel-spds');
  const panelDna  = document.getElementById('panel-dna');

  function setActive(id) {
    panelsEl.classList.add('has-active');
    panelSpds.classList.toggle('active', id === 'spds');
    panelDna.classList.toggle('active',  id === 'dna');
  }

  function clearActive() {
    panelsEl.classList.remove('has-active');
    panelSpds.classList.remove('active');
    panelDna.classList.remove('active');
  }

  panelSpds.addEventListener('mouseenter', () => setActive('spds'));
  panelDna.addEventListener('mouseenter',  () => setActive('dna'));
  panelsEl.addEventListener('mouseleave',  clearActive);

  // Touch support — tap to focus, tap again to release
  let touchActive = null;
  function handleTouch(id) {
    if (touchActive === id) {
      clearActive();
      touchActive = null;
    } else {
      setActive(id);
      touchActive = id;
    }
  }
  panelSpds.addEventListener('touchstart', e => { e.preventDefault(); handleTouch('spds'); }, { passive: false });
  panelDna.addEventListener('touchstart',  e => { e.preventDefault(); handleTouch('dna');  }, { passive: false });
</script>
</body>
</html>
